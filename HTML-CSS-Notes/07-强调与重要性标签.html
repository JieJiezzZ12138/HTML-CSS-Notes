<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>有语义强调与重要性标签</h2>
  <p>加粗：<strong>这是加粗的文本</strong></p>
  <p>斜体：<em>这是斜体的文本</em></p>
  <p>下划线：<u>这是下划线的文本</u></p>
  <p>删除线：<del>这是删除线的文本</del></p>

  <h2>无语义强调与重要性标签</h2>
  <p>加粗：<b>这是加粗的文本</b></p>
  <p>斜体：<i>这是斜体的文本</i></p>
  <p>下划线：<u>这是下划线的文本</u></p>
  <p>删除线：<s>这是删除线的文本</s></p>
</body>

</html>
